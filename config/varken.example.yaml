# Varken Configuration
# Copy this file to varken.yaml and customize

# =============================================================================
# GLOBAL SETTINGS - Application-wide configuration (optional)
# =============================================================================
# All values have sensible defaults and can be omitted

# global:
#   # Timeout for HTTP requests to services (in milliseconds)
#   httpTimeoutMs: 30000  # 30 seconds
#
#   # Timeout for health check requests (in milliseconds)
#   healthCheckTimeoutMs: 5000  # 5 seconds
#
#   # Timeout for collector execution (in milliseconds)
#   # If a collector takes longer than this, it will be terminated
#   collectorTimeoutMs: 60000  # 60 seconds
#
#   # Number of records per page when fetching paginated API endpoints
#   paginationPageSize: 250
#
#   # Maximum number of records to fetch from paginated endpoints
#   # This is a safety limit to prevent OOM on very large datasets
#   maxPaginationRecords: 10000

# =============================================================================
# OUTPUT PLUGINS - Where to send collected data
# =============================================================================
outputs:
  # InfluxDB 2.x (recommended)
  # influxdb2:
  #   url: "localhost"
  #   port: 8086
  #   token: "your-token-here"
  #   org: "varken"
  #   bucket: "varken"
  #   ssl: false
  #   verifySsl: false

  # InfluxDB 1.x (legacy)
  # influxdb1:
  #   url: "localhost"
  #   port: 8086
  #   username: "root"
  #   password: "root"
  #   database: "varken"
  #   ssl: false
  #   verifySsl: false

  # VictoriaMetrics
  # victoriametrics:
  #   url: "localhost"
  #   port: 8428
  #   ssl: false
  #   verifySsl: false

  # QuestDB
  # questdb:
  #   url: "localhost"
  #   port: 9000
  #   ssl: false
  #   verifySsl: false

  # TimescaleDB
  # timescaledb:
  #   host: "localhost"
  #   port: 5432
  #   database: "varken"
  #   username: "varken"
  #   password: "varken"
  #   ssl: false

